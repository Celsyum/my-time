name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\MyTime.sln

      - name: Publish app
        run: dotnet publish .\src\MyTime\MyTime.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false

      - name: Set release version
        id: version
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.version }}" ".\installer\MyTime.iss"'
        shell: powershell

      - name: Zip publish output
        run: Compress-Archive -Path .\src\MyTime\bin\Release\net10.0-windows\win-x64\publish\* -DestinationPath .\dist\MyTime-publish.zip -Force
        shell: powershell

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MyTime-Setup.exe
            dist/MyTime-publish.zip
          generate_release_notes: true
